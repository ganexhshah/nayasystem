version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: naya_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - naya_network
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: naya_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - naya_network
    depends_on:
      - app

  db:
    image: postgres:15-alpine
    container_name: naya_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-naya_db}
      POSTGRES_USER: ${DB_USERNAME:-naya_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - naya_network

  redis:
    image: redis:7-alpine
    container_name: naya_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - naya_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: naya_queue
    user: "www-data:www-data"
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
    networks:
      - naya_network
    depends_on:
      - db
      - redis

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: naya_scheduler
    user: "www-data:www-data"
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
    networks:
      - naya_network
    depends_on:
      - db
      - redis

volumes:
  pgdata:
  vendor_data:

networks:
  naya_network:
    driver: bridge
